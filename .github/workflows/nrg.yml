name: Regenerate READMEs
on:
  push:
    branches: [master]
    paths:
      - 'README.src.md'
      - '.github/workflows/nrg.yml'
  pull_request:
    paths:
      - 'README.src.md'
      - 'README.md'
      - 'README.zh.md'
      - '.github/workflows/nrg.yml'
permissions:
  contents: write
jobs:
  regenerate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: nanolaba/nrg-action@v1
        with:
          file: README.src.md
          nrg-version: '1.2'
      - name: Commit regenerated READMEs
        run: |
          paths='README.md README.zh.md'
          if [ -n "$(git status --porcelain $paths)" ]; then
            changed=$(git status --porcelain $paths | sed 's/^...//' | sed 's/^/  - /')
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add $paths
            git commit -m "docs: regenerate READMEs from README.src.md" \
              -m $'Files updated:\n'"$changed"
            git push
          fi

  drift-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nanolaba/nrg-action@v1
        with:
          file: README.src.md
          mode: check
          nrg-version: '1.2'
