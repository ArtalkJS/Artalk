name: Test Docs

on:
  push:
    paths: ["docs/**"]
    branches-ignore: ["release/*", "nightly"]
    tags-ignore: ["v*"]
  pull_request:
    paths: ["docs/**"]
    branches-ignore: ["release/*", "nightly"]

jobs:
  test_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Docs
        run: pnpm build:docs

      - name: Lint Docs
        run: pnpm eslint docs && pnpm prettier --check docs
